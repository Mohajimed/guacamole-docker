services:
  guacd:
    image: guacamole/guacd:1.6.0
    restart: unless-stopped
    networks: [guacnet]
    volumes:
      - ./drive:/drive
      - ./record:/record

  postgres:
    image: postgres:15.2-alpine
    restart: unless-stopped
    networks: [guacnet]
    environment:
      PGDATA: /var/lib/postgresql/data/guacamole
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: Z9DSkHfqrRrZgLvxx2DJVtX6jmvrPnVC
    volumes:
      - ./data:/var/lib/postgresql/data

  guac-init:
    image: guacamole/guacamole:1.6.0
    depends_on:
      - postgres
    networks: [guacnet]
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      set -e;
      echo 'Waiting for Postgres...';
      until pg_isready -h postgres -U guacamole_user -d guacamole_db; do sleep 2; done;

      echo 'Checking if schema exists...';
      export PGPASSWORD='Z9DSkHfqrRrZgLvxx2DJVtX6jmvrPnVC';
      if psql -h postgres -U guacamole_user -d guacamole_db -tAc \"SELECT 1 FROM information_schema.tables WHERE table_name='guacamole_user'\" | grep -q 1; then
        echo 'Schema already exists, skipping init.';
      else
        echo 'Creating schema...';
        /opt/guacamole/bin/initdb.sh --postgresql | psql -h postgres -U guacamole_user -d guacamole_db;
        echo 'Schema created.';
      fi
      "

    restart: "no"

  guacamole:
    image: guacamole/guacamole:1.6.0
    restart: unless-stopped
    depends_on:
      - guacd
      - postgres
      - guac-init
    networks: [guacnet]
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: guacamole_user
      POSTGRESQL_PASSWORD: Z9DSkHfqrRrZgLvxx2DJVtX6jmvrPnVC
      RECORDING_SEARCH_PATH: /record
    volumes:
      - ./record:/record
    expose:
      - "8080"

networks:
  guacnet:
    driver: bridge
